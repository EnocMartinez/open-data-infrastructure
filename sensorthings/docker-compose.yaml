version: '3.9'

services:
#------------------------------------------------#
# FROST-Server
#------------------------------------------------#
  sta:
    image: fraunhoferiosb/frost-server:latest
    container_name: sensorthings
    depends_on:
      - sta_db
    env_file:
      - ../../secrets/sensorthings.env
    environment:
      - maxTop=100000
      - http_cors_enable=true
      - http_cors_allowed.origins=*
      - persistence_db_driver=org.postgresql.Driver
      - persistence_autoUpdateDatabase=true
      - maxDataSize=50000000 # default is 25 MB, upgraded to 50
      - enableMultiDatastream=false
      - enableActuation=false
      - bus_workerPoolSize=50  ## max 50 threads
      - bus_queueSize=10000000  # 10 MB (default is unknown)
      - mqtt_Enabled=false
    ports:
      - 8080:8080

#------------------------------------------------#
# SensorThings Database from TimscaleDB HA image
#------------------------------------------------#
  sta_db:
    build:
      context: ./database
      dockerfile: Dockerfile
    image: postgres_postgis_timescaledb:local
    container_name: sta_db
    env_file:
      - ../../secrets/sensorthings.env
    ports:
      - 5432:5432
    networks:
      - sensorthings-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "sensorthings" ]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 10s

networks:
  sensorthings-net:
    external: true